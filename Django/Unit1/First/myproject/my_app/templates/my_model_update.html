<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Model</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            text-align: left;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #5599ff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #99ddff;
        }
        .btn-back {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #5599ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }
        .btn-back:hover {
            background: #99ddff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Update Model</h1>
        <form method="POST">
            {% csrf_token %}
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ my_model.name }}" required>
            <label for="description">Description:</label>
            <input type="text" id="description" name="description" value="{{ my_model.description }}" required>
            <button type="submit">Update</button>
        </form>
        <a href="{% url 'my_model_list' %}" class="btn-back">Back to List</a>
    </div>
</body>
</html>
