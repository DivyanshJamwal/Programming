<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Model List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin-bottom: 10px;
        }
        a {
            color: #5599ff;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #99ddff;
        }
        .btn-create {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #5599ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }
        .btn-create:hover {
            background: #99ddff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Model List</h1>
        <ul>
            {% for model in my_models %}
                <li>{{ model.name }} - <a href="{% url 'my_model_update' model.id %}">Update</a></li>
            {% endfor %}
        </ul>
        <a href="{% url 'my_model_create' %}" class="btn-create">Create Model</a>
    </div>
</body>
</html>
